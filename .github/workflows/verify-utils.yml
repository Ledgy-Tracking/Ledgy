name: Verify Utils

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/lib/utils.ts'
      - 'src/lib/utils.test.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Run Utils Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Vitest tests for utils
        run: pnpm vitest run src/lib/utils.test.ts
